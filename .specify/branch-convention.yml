# Branch & spec-folder naming convention for spec-kit
# Consumed automatically by /speckit-specify, /speckit-tiny-specify, and the validate/rename skills.
convention:
  branch_pattern: "{type}/{seq}-{kebab}"
  folder_pattern: "{seq}-{kebab}"
  type_prefix:
    feature: "feat"
    bugfix: "fix"
    hotfix: "hotfix"
    refactor: "refactor"
    docs: "docs"
  default_type: "feat"
  seq_padding: 3
  seq_start: 1
  max_length: 60
  separator: "-"
  lowercase: true
