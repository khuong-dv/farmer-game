schema_version: "1.0"

extension:
  id: tiny
  name: "TinySpec"
  version: "1.0.0"
  description: "Lightweight single-file workflow for small tasks — skip the heavy multi-step SDD process"
  author: "Quratulain-bilal"
  repository: "https://github.com/Quratulain-bilal/spec-kit-tinyspec"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.tiny.specify
      file: commands/speckit.tiny.specify.md
      description: "Generate a single lightweight spec file with context, plan, and tasks for small changes"
    - name: speckit.tiny.implement
      file: commands/speckit.tiny.implement.md
      description: "Implement a small change directly from its tinyspec file"
    - name: speckit.tiny.classify
      file: commands/speckit.tiny.classify.md
      description: "Classify task complexity and recommend tinyspec or full SDD workflow"

hooks:
  before_specify:
    command: speckit.tiny.classify
    optional: true
    prompt: "Check if this task is small enough for the lightweight tinyspec workflow?"
    description: "Auto-classify task complexity before starting the full SDD workflow"

tags:
  - "lightweight"
  - "small-tasks"
  - "workflow"
  - "productivity"
  - "efficiency"
